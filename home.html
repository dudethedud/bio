<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHEW | Home</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:'Inter',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

.container{
  text-align:center;
  max-width:600px;
}

h1{
  font-size:48px;
  letter-spacing:6px;
}

p{
  margin-top:20px;
  opacity:0.7;
  line-height:1.6;
}

/* subtle glow */
.glow{
  text-shadow:0 0 25px rgba(255,255,255,0.2);
}

/* back button */
.back{
  margin-top:40px;
  display:inline-block;
  font-size:12px;
  letter-spacing:3px;
  opacity:0.5;
  cursor:pointer;
}
.back:hover{opacity:1;}
</style>
</head>

<body>

<div class="container">
  <h1 class="glow">CHEW</h1>

  <p>
    Villain goalkeeper.<br>
    Cold presence in the box.<br><br>

    Built different.<br>
    No fear. No hesitation.<br>
    Just reaction.
  </p>

  <div class="back" onclick="goBack()">RETURN</div>
</div>

<script>
function goBack(){
  document.body.style.opacity="0";
  setTimeout(()=>{
    window.location.href="index.html";
  },800);
}
</script>

</body>
</html>
