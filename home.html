<script>
const cam = document.getElementById("camera");
let layers = [];
let speed = 6;
let targetSpeed = 6;

/* CREATE DEPTH LAYERS */
for(let i=0;i<20;i++){
  let layer = document.createElement("div");
  layer.className = "layer";

  let grid = document.createElement("div");
  grid.className = "grid";

  layer.appendChild(grid);

  let z = -i * 200;
  layer.dataset.z = z;

  cam.appendChild(layer);
  layers.push(layer);
}

/* STARS (3D PARALLAX) */
let stars=[];
for(let i=0;i<150;i++){
  let s=document.createElement('div');
  s.className='star';
  s.dataset.z = -Math.random()*2000;
  document.body.appendChild(s);
  stars.push(s);
}

function moveStars(){
  stars.forEach(s=>{
    let z=parseFloat(s.dataset.z);
    z+=2;
    if(z>200) z=-2000;
    s.dataset.z=z;
    s.style.transform=`translateZ(${z}px)`;
  });
  requestAnimationFrame(moveStars);
}
moveStars();

/* MAIN ANIMATION */
function animate(){
  speed += (targetSpeed - speed) * 0.05;

  layers.forEach(layer=>{
    let z = parseFloat(layer.dataset.z);
    z += speed;

    if(z > 200){
      z = -4000;
    }

    layer.dataset.z = z;

    let opacity = 1 - Math.abs(z)/4000;

    layer.style.transform = `
      translateZ(${z}px)
      rotateX(75deg)
    `;
    layer.style.opacity = opacity;
  });

  requestAnimationFrame(animate);
}
animate();

/* MOUSE CONTROL + SPEED BOOST */
document.addEventListener("mousemove", (e)=>{
  let x = (e.clientX/window.innerWidth - 0.5);
  let y = (e.clientY/window.innerHeight - 0.5);

  cam.style.transform = `
    rotateY(${x*15}deg)
    rotateX(${-y*10}deg)
  `;

  targetSpeed = 6 + Math.abs(x)*10;
});

/* SOCCER BALLS (3D FLOATING) */
for(let i=0;i<15;i++){
  let ball=document.createElement("div");
  ball.style.position="absolute";
  ball.style.width="30px";
  ball.style.height="30px";
  ball.style.background="url('https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg') center/contain no-repeat";

  ball.dataset.z = -Math.random()*4000;
  ball.style.left=Math.random()*100+"vw";
  ball.style.top=Math.random()*100+"vh";

  cam.appendChild(ball);

  function moveBall(){
    let z = parseFloat(ball.dataset.z);
    z += 8;

    if(z > 200){
      z = -4000;
      ball.style.left=Math.random()*100+"vw";
      ball.style.top=Math.random()*100+"vh";
    }

    ball.dataset.z = z;
    ball.style.transform = `translateZ(${z}px)`;

    requestAnimationFrame(moveBall);
  }

  moveBall();
}

/* RETURN */
function back(){
  document.body.style.opacity="0";
  setTimeout(()=>{
    window.location.href="./index.html";
  },800);
}
</script>
