<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHEW | Presence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
  background:black;
  color:white;
  overflow:hidden;
}

/* 3D SCENE */
.scene{
  perspective:1200px;
  width:100vw;
  height:100vh;
  overflow:hidden;
  position:relative;
}

/* CAMERA */
.camera{
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:transform 0.1s;
}

/* GRID FLOOR */
.grid{
  position:absolute;
  width:200%;
  height:200%;
  background:
    linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size:60px 60px;
  transform:rotateX(75deg) translateZ(-200px);
  opacity:0.25;
  animation:moveGrid 6s linear infinite;
}

@keyframes moveGrid{
  from{background-position:0 0;}
  to{background-position:0 60px;}
}

/* FOG LAYER */
.fog{
  position:absolute;
  width:150%;
  height:150%;
  background:radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%);
  transform:translateZ(-300px);
}

/* PARTICLES (stars) */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.4;
}

/* MAIN UI */
.ui{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) translateZ(200px);
  text-align:center;
}

/* NAME */
h1{
  font-size:72px;
  letter-spacing:12px;
  text-shadow:0 0 30px rgba(255,255,255,0.3);
  animation:pulse 3s infinite alternate;
}

@keyframes pulse{
  from{ text-shadow:0 0 20px rgba(255,255,255,0.2); }
  to{ text-shadow:0 0 70px rgba(255,255,255,0.8); }
}

.role{
  margin-top:10px;
  font-size:12px;
  letter-spacing:5px;
  opacity:0.6;
}

/* STATS */
.stats{
  margin-top:40px;
  display:flex;
  gap:40px;
  justify-content:center;
}

.stat{
  text-align:center;
}
.stat h2{
  font-size:26px;
}
.stat span{
  font-size:10px;
  opacity:0.5;
  letter-spacing:2px;
}

/* BUTTON */
.btn{
  margin-top:50px;
  font-size:12px;
  letter-spacing:4px;
  opacity:0.5;
  cursor:pointer;
}
.btn:hover{opacity:1;}
</style>
</head>

<body>

<div class="scene">
  <div class="camera" id="camera">

    <div class="grid"></div>
    <div class="fog"></div>

    <div class="ui">
      <h1>CHEW</h1>
      <div class="role">VILLAIN GOALKEEPER</div>

      <div class="stats">
        <div class="stat">
          <h2>99</h2>
          <span>REFLEXES</span>
        </div>
        <div class="stat">
          <h2>100</h2>
          <span>AURA</span>
        </div>
        <div class="stat">
          <h2>CLUTCH</h2>
          <span>MENTALITY</span>
        </div>
      </div>

      <div class="btn" onclick="back()">RETURN</div>
    </div>

  </div>
</div>

<script>
// STAR FIELD
for(let i=0;i<120;i++){
  let s=document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'vw';
  s.style.top=Math.random()*100+'vh';
  s.style.transform=`translateZ(${Math.random()*-500}px)`;
  document.body.appendChild(s);
}

// CAMERA PARALLAX (mouse movement)
const cam = document.getElementById("camera");

document.addEventListener("mousemove", (e)=>{
  let x = (e.clientX / window.innerWidth - 0.5) * 20;
  let y = (e.clientY / window.innerHeight - 0.5) * 20;

  cam.style.transform = `
    rotateY(${x}deg)
    rotateX(${-y}deg)
    translateZ(0)
  `;
});

// FORWARD MOTION (feels like moving through space)
let z = 0;
setInterval(()=>{
  z += 1;
  cam.style.transform += ` translateZ(${z}px)`;
},50);

// BACK BUTTON
function back(){
  document.body.style.opacity="0";
  setTimeout(()=>{
    window.location.href="./index.html";
  },800);
}
</script>

</body>
</html>
