<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHEW | Entrance</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{overflow:hidden;background:black;color:white;}

/* VIDEO */
#bgvid{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-4;
  filter:brightness(0.45) contrast(1.2);
  animation:zoom 20s ease-in-out infinite alternate, flicker 6s infinite;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}
@keyframes flicker{
  0%,100%{opacity:1;}
  50%{opacity:0.85;}
}

/* DARK + RED OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle, rgba(255,0,0,0.08), transparent),
    radial-gradient(circle, rgba(0,0,0,0.4), rgba(0,0,0,0.95));
  z-index:-3;
  transition:1s;
}

/* VIGNETTE */
body::after{
  content:'';
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9));
  pointer-events:none;
  z-index:-2;
}

/* CENTER */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.name{
  font-size:70px;
  letter-spacing:12px;
  font-weight:600;
  opacity:0;
  transform:scale(0.8);
}

/* GLITCH */
.glitch{
  animation:glitch 0.4s linear 2;
}
@keyframes glitch{
  0%{transform:translate(0);}
  25%{transform:translate(-3px,2px);}
  50%{transform:translate(3px,-2px);}
  75%{transform:translate(-2px,1px);}
  100%{transform:translate(0);}
}

.subtitle{
  margin-top:10px;
  font-size:12px;
  letter-spacing:4px;
  opacity:0;
}

/* AURA BAR */
.barWrap{
  position:absolute;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  width:320px;
  height:4px;
  background:rgba(255,255,255,0.1);
}
.bar{
  height:100%;
  width:0%;
  background:red;
}

.status{
  position:absolute;
  bottom:110px;
  left:50%;
  transform:translateX(-50%);
  font-size:11px;
  letter-spacing:3px;
  opacity:0.6;
}

/* ENTER */
.enter{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  letter-spacing:4px;
  opacity:0;
  cursor:pointer;
  transition:0.4s;
}

/* FLASH */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  z-index:5;
}

/* SHAKE */
@keyframes shake{
  0%{transform:translate(0);}
  25%{transform:translate(-6px,3px);}
  50%{transform:translate(6px,-3px);}
  75%{transform:translate(-3px,2px);}
  100%{transform:translate(0);}
}

/* PARTICLES */
.particle{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.2;
  animation:float linear infinite;
}
@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(-120vh);}
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bgvid">
  <source src="./bg.mp4" type="video/mp4">
</video>

<div class="overlay" id="overlay"></div>
<div class="flash" id="flash"></div>

<div class="center">
  <div class="name" id="name">CHEW</div>
  <div class="subtitle" id="sub">VILLAIN GOALKEEPER</div>
</div>

<div class="status" id="status">INITIALIZING...</div>

<div class="barWrap">
  <div class="bar" id="bar"></div>
</div>

<div class="enter" id="enter" onclick="enter()">ENTER</div>

<audio id="music" loop>
  <source src="./aura.mp3" type="audio/mp3">
</audio>

<script>
// PARTICLES
for(let i=0;i<80;i++){
  let p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'vw';
  p.style.top=Math.random()*100+'vh';
  p.style.animationDuration=(10+Math.random()*20)+'s';
  document.body.appendChild(p);
}

let aura=0;
let bar=document.getElementById('bar');
let status=document.getElementById('status');
let enterBtn=document.getElementById('enter');
let name=document.getElementById('name');
let sub=document.getElementById('sub');
let flash=document.getElementById('flash');
let music=document.getElementById('music');

// TEXT TIMELINE
setTimeout(()=>status.innerText="ENTERING STADIUM",1500);
setTimeout(()=>status.innerText="LOCKING TARGET",3500);
setTimeout(()=>status.innerText="AURA BUILDING",5500);

// REVEAL NAME
setTimeout(()=>{
  name.style.opacity=1;
  name.style.transform="scale(1)";
  name.classList.add("glitch");
  sub.style.opacity=0.7;
},2000);

// BUILD AURA
let build=setInterval(()=>{
  aura += Math.random()*3+2;
  if(aura>100) aura=100;

  bar.style.width = aura + "%";

  let intensity = aura/100;
  name.style.textShadow = `0 0 ${20+intensity*80}px red`;

  if(aura>70){
    status.innerText="DOMINATING...";
  }

  if(aura>95){
    status.innerText="AURA MAXED";

    enterBtn.style.opacity=1;

    flash.style.opacity=1;
    setTimeout(()=>flash.style.opacity=0,200);

    document.body.style.animation="shake 0.3s";
    setTimeout(()=>document.body.style.animation="",300);

    clearInterval(build);
  }

},180);

// MUSIC START
document.addEventListener("click", ()=>{
  music.volume=0.6;
  music.play().catch(()=>{});
}, {once:true});

// ENTER
function enter(){
  document.body.style.transition="1.2s";
  document.body.style.opacity="0";

  setTimeout(()=>{
    window.location.href="home.html";
  },1200);
}
</script>

</body>
</html>
